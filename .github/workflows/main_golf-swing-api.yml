name: Deploy FastAPI to Azure Web App (No ZIP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 依存関係チェック（任意）
      - name: Install dependencies (local check only)
        run: |
          pip install -r requirements.txt

      # ZIP を作らず、artifact も作らない
      # → Oryx が Azure 側で自動ビルド
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B4FDE1797D9D4B0CBD350B0A3C1AE628 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_675BDA3E46B1438EA26AA1CBF94B5A64 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_985AF4B5B851433C9AE14EEE36FD4C7D }}

      - name: Deploy using Oryx (No ZIP)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'golf-swing-api'
          slot-name: 'Production'
          package: .
